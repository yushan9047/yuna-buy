<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>預購商品（韓國）</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 下方預購列表的小樣式，延續整體風格 */
    .order-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .order-card {
      border-radius: 14px;
      border: 1px solid var(--soft-border);
      padding: 8px 10px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .order-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .order-name-input {
      width: 100%;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      background: transparent;
      padding: 2px 4px;
      border-radius: 8px;
    }

    .order-name-input:focus {
      outline: 1px solid var(--primary);
      background: #eff6ff;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: #f3f4f6;
      color: #4b5563;
    }

    .badge--bought {
      background: #dcfce7;
      color: #166534;
    }

    .order-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 10px;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    @media (min-width: 700px) {
      .order-fields {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .field-label {
      color: var(--text-sub);
      font-size: 0.7rem;
    }

    .field-input,
    .field-select {
      width: 100%;
      font-size: 0.78rem;
      padding: 3px 5px;
      border-radius: 8px;
      border: 1px solid var(--soft-border);
      background: #ffffff;
    }

    .field-input:focus,
    .field-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.15);
      background: #f9fafb;
    }

    .order-footer-row {
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
    }

    .toggle-bought {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-bought input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .empty-state {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--text-sub);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header-bar">
    <button class="back-btn" type="button" onclick="window.history.back()">← 返回</button>
    <h2>🇰🇷 預購商品（韓國）</h2>
  </div>

  <main class="page-body">
    <!-- 上方：新增表單 -->
    <div class="card">

      <div class="form-group">
        <label>📷 商品照片</label>
        <input type="file" id="pImg" accept="image/*">
      </div>
      
      <!-- 商品名稱 -->
      <div class="form-group">
        <label for="pName">📦 商品名稱</label>
        <input type="text" id="pName" placeholder="請輸入商品名稱">
      </div>

      <!-- 購入幣別選擇 -->
      <div class="form-group">
        <label>💱 購入幣別</label>
        <div class="btn-group">
          <button type="button" class="btn-opt active"
                  onclick="setCurrency('KRW', this)">韓幣 (₩)</button>
          <button type="button" class="btn-opt"
                  onclick="setCurrency('USD', this)">美金 (US$)</button>
        </div>
        <input type="hidden" id="pCurrency" value="KRW">
      </div>

      <!-- 韓幣價格 -->
      <div class="form-group" id="priceKRWGroup">
        <label for="pPriceKRW">💰 韓幣購入價格 (₩)</label>
        <input type="number" id="pPriceKRW" placeholder="0" min="0">
      </div>

      <!-- 美金價格 -->
      <div class="form-group" id="priceUSDGroup" style="display:none;">
        <label for="pPriceUSD">💵 美金購入價格 (US$)</label>
        <input type="number" id="pPriceUSD" placeholder="0" min="0" step="0.01">
      </div>

      <!-- 販售價格 -->
      <div class="form-group">
        <label for="pPriceSell">💎 販售價格 (NT$)</label>
        <input type="number" id="pPriceSell" placeholder="0" min="0">
      </div>

      <!-- 數量 -->
      <div class="form-group">
        <label for="pQty">🔢 預購數量</label>
        <input type="number" id="pQty" value="1" min="1">
      </div>

      <!-- 顧客 -->
      <div class="form-group">
        <label for="pCustomer">👤 顧客名</label>
        <input type="text" id="pCustomer" placeholder="客名">
      </div>

      <!-- 負責人 -->
      <div class="form-group">
        <label>🧤 負責人</label>
        <div class="btn-group" id="buyerGroup">
          <button type="button" class="btn-opt"
                  onclick="setBuyer('Nana', this)">Nana</button>
          <button type="button" class="btn-opt"
                  onclick="setBuyer('Cupid', this)">Cupid</button>
        </div>
        <input type="hidden" id="pBuyer">
      </div>

      <!-- 儲存 -->
      <button class="submit-btn" type="button" onclick="saveData()">
        🚀 確認儲存
      </button>
    </div>

    <!-- 下方：當頁韓國預購清單（可編輯 + 已買開關） -->
    <div class="card" style="margin-top: 14px;">
      <div class="form-group" style="margin-bottom: 8px;">
        <label>🧾 這趟韓國預購清單</label>
      </div>
      <div id="krPreorderList" class="order-list"></div>
      <div id="krEmptyState" class="empty-state" style="display:none;">
        目前尚未新增任何韓國預購商品。
      </div>
    </div>

  </main>

  <script>
  const STORAGE_KEY = 'yunaOrders';

  function deleteOrder(id) {
    const confirmDelete = confirm("確定要刪除這筆資料嗎？");
    if (!confirmDelete) return;

    const list = loadOrders().filter(o => o.id !== id);
    saveOrdersToStorage(list);
    renderKRPreorders();
  }

  function readImageAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function loadOrders() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch (e) {
      console.error('讀取 yunaOrders 失敗', e);
      return [];
    }
  }

  function saveOrdersToStorage(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function addOrderToStorage(order) {
    const list = loadOrders();
    list.push(order);
    saveOrdersToStorage(list);
  }

  /* ========= 表單區：幣別 / 買手選擇 ========= */

  function setCurrency(type, btnEl) {
    const currencyInput = document.getElementById('pCurrency');
    currencyInput.value = type;

    const group = btnEl.parentElement;
    const buttons = group.querySelectorAll('.btn-opt');
    buttons.forEach(btn => btn.classList.remove('active'));
    btnEl.classList.add('active');

    const krw = document.getElementById('priceKRWGroup');
    const usd = document.getElementById('priceUSDGroup');

    if (type === 'KRW') {
      krw.style.display = 'block';
      usd.style.display = 'none';
      document.getElementById('pPriceUSD').value = '';
    } else {
      krw.style.display = 'none';
      usd.style.display = 'block';
      document.getElementById('pPriceKRW').value = '';
    }
  }

  function setBuyer(name, btnEl) {
    const buyerInput = document.getElementById('pBuyer');
    buyerInput.value = name;

    const group = document.getElementById('buyerGroup');
    const buttons = group.querySelectorAll('.btn-opt');
    buttons.forEach(btn => btn.classList.remove('active'));

    btnEl.classList.add('active');
  }

  /* ========= 表單區：儲存 ========= */

  async function saveData() {
    const fileInput = document.getElementById('pImg');
    let imageBase64 = null;

    if (fileInput.files.length > 0) {
      imageBase64 = await readImageAsBase64(fileInput.files[0]);
    }

    const currency = document.getElementById('pCurrency').value;

    const data = {
      name: document.getElementById('pName').value.trim(),
      currency,
      priceKRW: Number(document.getElementById('pPriceKRW').value || 0),
      priceUSD: Number(document.getElementById('pPriceUSD').value || 0),
      sellPrice: Number(document.getElementById('pPriceSell').value || 0),
      qty: Number(document.getElementById('pQty').value || 1),
      customer: document.getElementById('pCustomer').value.trim(),
      buyer: document.getElementById('pBuyer').value
    };

    if (!data.name) return alert("請輸入商品名稱");
    if (!data.buyer) return alert("請選擇負責人");

    const cost = currency === 'KRW' ? data.priceKRW : data.priceUSD;

    const order = {
      id: 'O-' + Date.now().toString(36),
      type: 'preorder',
      country: 'KR',
      name: data.name,
      qty: data.qty,
      buyer: data.buyer,
      customer: data.customer,
      currency,
      cost,
      sellPrice: data.sellPrice || null,
      isBought: false,
      image: imageBase64
    };

    addOrderToStorage(order);
    renderKRPreorders();
    alert("已儲存");

    // 簡單清空表單（不清空幣別）
    document.getElementById('pName').value = '';
    document.getElementById('pPriceKRW').value = '';
    document.getElementById('pPriceUSD').value = '';
    document.getElementById('pPriceSell').value = '';
    document.getElementById('pQty').value = 1;
    document.getElementById('pCustomer').value = '';
    document.getElementById('pBuyer').value = '';
    document.getElementById('pImg').value = '';

    const buyerButtons = document.querySelectorAll('#buyerGroup .btn-opt');
    buyerButtons.forEach(btn => btn.classList.remove('active'));
  }

  /* ========= 下方列表：更新欄位 / 已買開關 ========= */

  function updateOrderField(id, field, rawValue, valueType = 'string') {
    const list = loadOrders();
    const idx = list.findIndex(o => o.id === id);
    if (idx === -1) return;

    let value = rawValue;

    if (valueType === 'number') {
      if (rawValue === '') {
        value = null;
      } else {
        value = Number(rawValue);
        if (Number.isNaN(value)) value = null;
      }
    } else if (valueType === 'int') {
      if (rawValue === '') {
        value = null;
      } else {
        value = parseInt(rawValue, 10);
        if (Number.isNaN(value)) value = null;
      }
    } else if (valueType === 'bool') {
      value = !!rawValue;
    } else {
      value = rawValue.trim();
    }

    list[idx][field] = value;
    saveOrdersToStorage(list);
  }

  function toggleBought(id, checked) {
    updateOrderField(id, 'isBought', checked, 'bool');
    renderKRPreorders();
  }

  function toggleDetail(id) {
    const el = document.getElementById('detail-' + id);
    if (!el) return;
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  /* ========= 下方列表：渲染（顧客分組 + 縮合 + 編輯/刪除） ========= */

  function renderKRPreorders() {
    const container = document.getElementById('krPreorderList');
    const emptyState = document.getElementById('krEmptyState');
    container.innerHTML = '';
  
    const list = loadOrders().filter(o => o.type === 'preorder' && o.country === 'KR');
  
    if (list.length === 0) {
      emptyState.style.display = 'block';
      return;
    } else {
      emptyState.style.display = 'none';
    }
  
    // 依顧客分組
    const grouped = {};
    list.forEach(order => {
      const key = order.customer || '未填顧客';
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(order);
    });
  
    Object.keys(grouped).forEach(customerName => {
      const groupCard = document.createElement('div');
      groupCard.className = 'order-card';
  
      const header = document.createElement('div');
      header.className = 'order-title-row';
      header.innerHTML = `<strong>👤 ${customerName}</strong>`;
  
      const content = document.createElement('div');
      content.style.display = 'flex';
      content.style.flexDirection = 'column';
      content.style.gap = '8px';
      content.style.marginTop = '6px';
  
      grouped[customerName].forEach(order => {
        const isBought = !!order.isBought;
        const row = document.createElement('div');
        row.style.borderTop = '1px solid var(--soft-border)';
        row.style.paddingTop = '8px';
        // ✅ 勾已買 → 整列淡綠底
        row.style.background = isBought ? '#ecfdf3' : '#ffffff';
  
        const boughtColor = isBought ? '#16a34a' : '#6b7280';
        const currencyText = order.currency === 'USD'
          ? 'US$'
          : (order.currency === 'KRW' ? '₩' : (order.currency || ''));
  
        row.innerHTML = `
          <!-- 收合時：摘要列 -->
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
              ${order.image
                ? `<img src="${order.image}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;">`
                : ''
              }
              <div>
                <div><strong>${order.name || ''}</strong></div>
                <div style="font-size:0.75rem;color:#6b7280;">
                  成本 ${order.cost || 0} ${currencyText} ｜ 售價 ${order.sellPrice || 0} NT$
                </div>
              </div>
            </div>
  
            <div style="display:flex; gap:8px; align-items:center;">
              <label style="display:flex;align-items:center;gap:4px;font-size:0.8rem;color:${boughtColor};">
                <input type="checkbox"
                  ${isBought ? 'checked' : ''}
                  onchange="toggleBought('${order.id}', this.checked)">
                ${isBought ? '已買' : '未買'}
              </label>
  
              <button type="button"
                onclick="toggleDetail('${order.id}')"
                style="font-size:0.75rem;">✏</button>
  
              <button type="button"
                onclick="deleteOrder('${order.id}')"
                style="font-size:0.75rem;color:red;">🗑</button>
            </div>
          </div>
  
          <!-- 展開時：詳細區塊 -->
          <div id="detail-${order.id}" style="display:none; margin-top:8px; font-size:0.8rem;">
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
  
              <div>
                商品名：
                <input type="text"
                  value="${order.name || ''}"
                  oninput="updateOrderField('${order.id}','name',this.value,'string')">
              </div>
  
              <div>
                成本：
                <input type="number"
                  value="${order.cost || ''}"
                  oninput="updateOrderField('${order.id}','cost',this.value,'number')">
              </div>
  
              <div>
                售價：
                <input type="number"
                  value="${order.sellPrice || ''}"
                  oninput="updateOrderField('${order.id}','sellPrice',this.value,'number')">
              </div>
  
              <div>
                數量：
                <input type="number"
                  value="${order.qty || 1}"
                  oninput="updateOrderField('${order.id}','qty',this.value,'int')">
              </div>
  
              <div>
                買手：
                <select onchange="updateOrderField('${order.id}','buyer',this.value,'string')">
                  <option value="">未指定</option>
                  <option value="Nana"  ${order.buyer === 'Nana'  ? 'selected' : ''}>Nana</option>
                  <option value="Cupid" ${order.buyer === 'Cupid' ? 'selected' : ''}>Cupid</option>
                </select>
              </div>
  
              <!-- ✅ 幣別選擇 -->
              <div>
                幣別：
                <select onchange="updateOrderField('${order.id}','currency',this.value,'string')">
                  <option value="KRW" ${order.currency === 'KRW' || !order.currency ? 'selected' : ''}>韓幣 (₩)</option>
                  <option value="USD" ${order.currency === 'USD' ? 'selected' : ''}>美金 (US$)</option>
                </select>
              </div>
  
            </div>
          </div>
        `;
  
        content.appendChild(row);
      });
  
      groupCard.appendChild(header);
      groupCard.appendChild(content);
      container.appendChild(groupCard);
    });
  }

  // 初次載入時畫一次
  renderKRPreorders();
</script>
</body>
</html>
