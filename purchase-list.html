<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>採購明細</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .filter-card { margin-bottom: 16px; }
    .order-list { display: flex; flex-direction: column; gap: 10px; }
    .order-card { border-radius: 16px; border: 1px solid var(--soft-border); padding: 10px 12px; background: #ffffff; display: flex; flex-direction: column; gap: 6px; }
    .order-card--bought { background: #ecfdf3; border-color: #bbf7d0; }
    .order-title-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 4px; }
    .title-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .thumb { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; border: 1px solid var(--soft-border); background: #fff; flex: 0 0 auto; }
    .order-name-input { width: 100%; font-size: 0.95rem; font-weight: 600; border: none; background: transparent; padding: 2px 4px; border-radius: 8px; min-width: 0; }
    .order-name-input:focus { outline: 1px solid var(--primary); background: #eff6ff; }
    .order-type-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; flex: 0 0 auto; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
    .badge--onsite { background: #dbeafe; color: #1d4ed8; }
    .badge--preorder { background: #dcfce7; color: #15803d; }
    .badge--country { background: #f3f4f6; color: #4b5563; }
    .badge--bought { background: #dcfce7; color: #166534; }
    .badge--notbought { background: #f3f4f6; color: #6b7280; }
    .order-fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px 10px; font-size: 0.8rem; }
    .field { display: flex; flex-direction: column; gap: 2px; }
    .field-label { color: var(--text-sub); font-size: 0.74rem; }
    .field-input, .field-select { width: 100%; font-size: 0.8rem; padding: 4px 6px; border-radius: 8px; border: 1px solid var(--soft-border); background: #ffffff; }
    .field-input:focus, .field-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 1px rgba(59,130,246,0.15); background: #f9fafb; }
    .field-input[readonly] { background: #f9fafb; color: var(--text-sub); }
    @media (min-width: 700px) { .order-fields { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
    .order-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .toggle-bought { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-sub); user-select: none; }
    .toggle-bought input { width: 16px; height: 16px; cursor: pointer; }
    .order-action-btn { border-radius: 999px; border: 1px solid var(--soft-border); background: #ffffff; padding: 4px 10px; font-size: 0.78rem; cursor: pointer; color: var(--text-main); display: inline-flex; align-items: center; gap: 4px; }
    .order-action-btn:hover { background: var(--soft); }
    .order-action-btn--danger { border-color: #fecaca; color: #b91c1c; }
    .order-action-btn--danger:hover { background: #fee2e2; }
    .empty-state { margin-top: 12px; font-size: 0.85rem; color: var(--text-sub); text-align: center; }
  </style>
</head>
<body>
  <div class="header-bar">
    <button class="back-btn" type="button" onclick="window.history.back()">← 返回</button>
    <h2>採購明細</h2>
  </div>

  <main class="page-body">
    <div class="card filter-card">
      <div class="form-group">
        <label>📂 查看內容</label>
        <div class="btn-group" id="filterGroup">
          <button type="button" class="btn-opt active" onclick="setFilter('all', this)">全部</button>
          <button type="button" class="btn-opt" onclick="setFilter('onsite', this)">現場採購</button>
          <button type="button" class="btn-opt" onclick="setFilter('preorder', this)">預購清單</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="form-group" style="margin-bottom: 10px;">
        <label>🧾 採購清單（可直接點欄位編輯）</label>
      </div>

      <div id="orderList" class="order-list"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        目前沒有符合條件的資料。
      </div>
    </div>
  </main>

<script type="module">
import { ensurePinOrRedirect } from "./pin.js";
import { listOrders, updateOrder, deleteOrder } from "./orders-api.js";
ensurePinOrRedirect();

let currentFilter = "all";
let orders = [];

function setFilter(type, btnEl) {
  currentFilter = type;
  const group = document.getElementById('filterGroup');
  group.querySelectorAll('.btn-opt').forEach(btn => btn.classList.remove('active'));
  btnEl.classList.add('active');
  renderList();
}

async function refreshOrders() {
  orders = await listOrders();
}

async function updateTop(id, field, rawValue, valueType = 'string') {
  let value = rawValue;

  if (valueType === 'number') {
    if (rawValue === '') value = null;
    else {
      value = Number(rawValue);
      if (Number.isNaN(value)) value = null;
    }
  } else if (valueType === 'int') {
    if (rawValue === '') value = null;
    else {
      value = parseInt(rawValue, 10);
      if (Number.isNaN(value)) value = null;
    }
  } else {
    value = String(rawValue ?? '').trim();
  }

  const patch = {};
  if (field === "sellPrice") patch["sellPrice"] = value;
  else patch[field] = value;

  await updateOrder(id, patch, null);

  if (field === 'buyer') await renderList();
}

async function updateExtra(id, extraPatch) {
  await updateOrder(id, {}, extraPatch);
}

async function toggleBought(id, checked) {
  await updateExtra(id, { isBought: !!checked });
  await renderList();
}

async function deleteOne(id) {
  const ok = confirm('確定要刪除這筆資料嗎？此動作無法復原。');
  if (!ok) return;
  await deleteOrder(id);
  await renderList();
}

function safeText(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function renderList() {
  await refreshOrders();

  const container = document.getElementById('orderList');
  const emptyState = document.getElementById('emptyState');
  container.innerHTML = '';

  const filtered = orders.filter(o => {
    if (currentFilter === 'onsite') return o.type === 'onsite';
    if (currentFilter === 'preorder') return o.type === 'preorder';
    return true;
  });

  if (filtered.length === 0) {
    emptyState.style.display = 'block';
    return;
  } else {
    emptyState.style.display = 'none';
  }

  filtered.forEach(order => {
    const div = document.createElement('div');

    const isPreorder = order.type === 'preorder';
    const isBought = !!(order.extra?.isBought);

    div.className = 'order-card' + (isPreorder && isBought ? ' order-card--bought' : '');

    const typeLabel = order.type === 'onsite' ? '現場採購' : '預購';
    const typeBadgeClass = order.type === 'onsite' ? 'badge--onsite' : 'badge--preorder';

    const mainCost = order.cost != null ? order.cost : '';
    const sellPrice = order.sellPrice != null ? order.sellPrice : '';

    const isJP = order.country === 'JP';
    const buyer = order.buyer || '';

    let buyerOptionsHtml = '';
    if (isJP) {
      buyerOptionsHtml = `
        <option value="">未指定</option>
        <option value="Ray" ${buyer === 'Ray' ? 'selected' : ''}>Ray</option>
        <option value="Nana" ${buyer === 'Nana' ? 'selected' : ''}>Nana</option>
        <option value="Cupid" ${buyer === 'Cupid' ? 'selected' : ''}>Cupid</option>
      `;
    } else {
      buyerOptionsHtml = `
        <option value="">未指定</option>
        <option value="Nana" ${buyer === 'Nana' ? 'selected' : ''}>Nana</option>
        <option value="Cupid" ${buyer === 'Cupid' ? 'selected' : ''}>Cupid</option>
      `;
    }

    const buyerSelectHtml = `
      <div class="field">
        <span class="field-label">買手</span>
        <select class="field-select" onchange="updateTop('${order.id}', 'buyer', this.value, 'string')">
          ${buyerOptionsHtml}
        </select>
      </div>
    `;

    let cardFieldHtml = '';
    if (isJP) {
      const rayCard = (order.extra && order.extra.rayCard) ? order.extra.rayCard : '';
      const displayStyle = buyer === 'Ray' ? '' : 'style="display:none;"';

      cardFieldHtml = `
        <div class="field" ${displayStyle}>
          <span class="field-label">Ray 信用卡</span>
          <select class="field-select" onchange="updateExtra('${order.id}', { rayCard: this.value })">
            <option value="">未指定</option>
            <option value="na爸卡" ${rayCard === 'na爸卡' ? 'selected' : ''}>na爸卡</option>
            <option value="ray卡" ${rayCard === 'ray卡' ? 'selected' : ''}>ray卡</option>
            <option value="qp卡" ${rayCard === 'qp卡' ? 'selected' : ''}>qp卡</option>
          </select>
        </div>
      `;
    }

    const boughtBadgeHtml = isPreorder ? `
      <span class="badge ${isBought ? 'badge--bought' : 'badge--notbought'}">
        ${isBought ? '已買' : '未買'}
      </span>
    ` : '';

    const boughtToggleHtml = isPreorder ? `
      <label class="toggle-bought" style="color:${isBought ? '#166534' : 'var(--text-sub)'};">
        <input type="checkbox" ${isBought ? 'checked' : ''} onchange="toggleBought('${order.id}', this.checked)">
        <span>${isBought ? '已標記為已買' : '點一下標記為已買'}</span>
      </label>
    ` : `<div></div>`;

    const thumbHtml = order.image ? `<img class="thumb" src="${order.image}" alt="商品照片">` : '';

    // KR 第二成本（若有）
    const cost2 = order.extra?.cost2;
    const currency2 = order.extra?.currency2;
    const cost2Text = (cost2 != null && currency2) ? `${cost2} ${currency2}` : "";

    div.innerHTML = `
      <div class="order-title-row">
        <div class="title-left">
          ${thumbHtml}
          <input class="order-name-input"
            value="${safeText(order.name || '')}"
            placeholder="商品名稱"
            oninput="updateTop('${order.id}', 'name', this.value, 'string')"
          />
        </div>

        <div class="order-type-badges">
          <span class="badge ${typeBadgeClass}">${typeLabel}</span>
          ${boughtBadgeHtml}
          <span class="badge badge--country">${safeText(order.country || '-')}</span>
        </div>
      </div>

      <div class="order-fields">
        <div class="field">
          <span class="field-label">數量</span>
          <input class="field-input" type="number" min="0"
            value="${order.qty != null ? order.qty : ''}"
            oninput="updateTop('${order.id}', 'qty', this.value, 'int')"
          />
        </div>

        ${buyerSelectHtml}

        <div class="field">
          <span class="field-label">顧客</span>
          <input class="field-input" type="text"
            value="${safeText(order.customer || '')}"
            oninput="updateTop('${order.id}', 'customer', this.value, 'string')"
          />
        </div>

        <div class="field">
          <span class="field-label">地點</span>
          <input class="field-input" type="text"
            value="${safeText(order.loc || '')}"
            oninput="updateExtra('${order.id}', { loc: this.value })"
          />
        </div>

        <div class="field">
          <span class="field-label">成本 (${safeText(order.currency || '-')})</span>
          <input class="field-input" type="number"
            value="${safeText(mainCost)}"
            oninput="updateTop('${order.id}', 'cost', this.value, 'number')"
          />
        </div>

        <div class="field">
          <span class="field-label">售價 (NT$)</span>
          <input class="field-input" type="number"
            value="${safeText(sellPrice)}"
            oninput="updateTop('${order.id}', 'sellPrice', this.value, 'number')"
          />
        </div>

        ${cost2Text ? `
          <div class="field">
            <span class="field-label">第二成本</span>
            <input class="field-input" type="text" value="${safeText(cost2Text)}" readonly />
          </div>
        ` : ''}

        ${cardFieldHtml}
      </div>

      <div class="order-actions">
        ${boughtToggleHtml}
        <button class="order-action-btn order-action-btn--danger" onclick="deleteOne('${order.id}')">
          🗑 <span>刪除</span>
        </button>
      </div>
    `;

    container.appendChild(div);
  });
}

window.setFilter = setFilter;
window.updateTop = updateTop;
window.updateExtra = updateExtra;
window.toggleBought = toggleBought;
window.deleteOne = deleteOne;

renderList();
</script>
</body>
</html>
