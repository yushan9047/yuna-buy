<body>
  <div class="app-shell">
    <header class="home-header-bar">
      <div class="home-logo-area">
        <div class="home-logo-icon">Y</div>
        <div class="home-logo-text">
          <div class="home-logo-title">YUNA SELECT</div>
          <div class="home-logo-subtitle">代購管理系統 v32</div>
        </div>
      </div>
    </header>

    <main class="home-content">
      <section class="home-card-grid">

        <button class="home-card-btn" onclick="location.href='addPurchase.html'">
          <div class="home-card-banner home-banner-add"></div>
          <div class="home-card-body">
            <h2>新增現場採購</h2>
            <p>現場掃貨時，快速記錄品項與成本。</p>
          </div>
        </button>

        <button class="home-card-btn" onclick="location.href='purchaseDetails.html'">
          <div class="home-card-banner home-banner-list"></div>
          <div class="home-card-body">
            <h2>採購明細</h2>
            <p>查看每一筆採購紀錄與匯總資訊。</p>
          </div>
        </button>

        <button class="home-card-btn" onclick="location.href='preOrder.html'">
          <div class="home-card-banner home-banner-pre"></div>
          <div class="home-card-body">
            <h2>預購商品</h2>
            <p>整理顧客預購清單，避免漏單。</p>
          </div>
        </button>

        <button class="home-card-btn" onclick="location.href='accounting.html'">
          <div class="home-card-banner home-banner-cust"></div>
          <div class="home-card-body">
            <h2>顧客統計對帳</h2>
            <p>一鍵看每位顧客的訂單與收款狀態。</p>
          </div>
        </button>

      </section>
    </main>
  </div>
</body>
