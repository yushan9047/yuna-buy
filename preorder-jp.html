<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新增預購商品（日本）</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .order-list { display:flex; flex-direction:column; gap:10px; }
    .empty-state { margin-top:6px; font-size:0.8rem; color:var(--text-sub); text-align:center; }
    .field-input, .field-select{
      width:100%;
      font-size:0.78rem;
      padding:6px 8px;
      border-radius:10px;
      border:1px solid var(--soft-border);
      background:#fff;
    }
    .field-input:focus, .field-select:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 1px rgba(59,130,246,0.15);
      background:#f9fafb;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <button class="back-btn" onclick="window.history.back()">← 返回</button>
    <h2>🇯🇵 新增預購商品</h2>
  </div>

  <main class="page-body">
    <div class="card">
      <div class="form-group">
        <label>📷 商品照片</label>
        <input type="file" id="preImg" accept="image/*">
      </div>
      <div class="form-group">
        <label>📦 品名</label>
        <input type="text" id="preName" placeholder="商品名稱">
      </div>
      <div class="form-group">
        <label>👤 顧客名稱</label>
        <input type="text" id="preCust" placeholder="顧客名稱">
      </div>

      <div class="form-group">
        <label>🧤 負責買手</label>
        <div class="btn-group" id="preBuyerGroup">
          <button class="btn-opt" type="button" onclick="setPreBuyer('Ray', this)">Ray</button>
          <button class="btn-opt" type="button" onclick="setPreBuyer('Nana', this)">Nana</button>
          <button class="btn-opt" type="button" onclick="setPreBuyer('Cupid', this)">Cupid</button>
        </div>
        <input type="hidden" id="preBuyer">

        <div id="preRayCardOptions" style="display:none; background:var(--soft); padding:15px; border-radius:25px; margin-top:15px; border:1px solid var(--soft-border);">
          <label style="color:var(--primary);">💳 選擇卡片</label>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn-opt" type="button" onclick="setPreRayCard('na爸卡', this)" style="padding:10px">na爸卡</button>
            <button class="btn-opt" type="button" onclick="setPreRayCard('ray卡', this)" style="padding:10px">ray卡</button>
            <button class="btn-opt" type="button" onclick="setPreRayCard('qp卡', this)" style="padding:10px">qp卡</button>
          </div>
          <input type="hidden" id="preRayCard">
        </div>
      </div>

      <div class="form-group">
        <label>📍 採買地點</label>
        <input type="text" id="preLoc" placeholder="地點">
      </div>

      <div class="form-group">
        <label>🏷️ 退稅</label>
        <div class="btn-group">
          <button id="taxBtnYes" class="btn-opt" type="button" onclick="togglePreTax(true)">有退稅</button>
          <button id="taxBtnNo" class="btn-opt active" type="button" onclick="togglePreTax(false)">無退稅</button>
        </div>
        <input type="hidden" id="preIsTaxFree" value="false">
      </div>

      <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1.5">
          <label>💴 含稅價 (¥)</label>
          <input type="number" id="preTaxPrice" placeholder="0">
        </div>
        <div class="form-group" id="taxRateGroup" style="flex:1; display:none;">
          <label>％ 稅率</label>
          <input type="number" id="preTaxRate" value="10">
        </div>
      </div>

      <div class="form-group" id="preTaxFreeGroup" style="display:none;">
        <label>💸 退稅價 (¥)</label>
        <input type="number" id="preTaxFreePrice" placeholder="0">
      </div>

      <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1">
          <label>🔢 數量</label>
          <select id="preQty" class="field-select">
            <option value="1" selected>1</option>
            <option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
          </select>
        </div>
        <div class="form-group" style="flex:1">
          <label>💰 售價 (NT$)</label>
          <input type="number" id="preSellPrice" placeholder="0">
        </div>
      </div>

      <button class="submit-btn" style="background:var(--green);" type="button" onclick="savePreOrder()">✅ 儲存預購</button>
    </div>

    <div class="card" style="margin-top: 14px;">
      <div class="form-group" style="margin-bottom: 8px;">
        <label>🧾 這趟日本預購清單</label>
      </div>
      <div id="preOrderList" class="order-list"></div>
      <div id="jpEmptyState" class="empty-state" style="display:none;">
        目前尚未新增任何日本預購商品。
      </div>
    </div>
  </main>

<script type="module">
import { ensurePinOrRedirect } from "./pin.js";
import { listOrders, createOrder, updateOrder, deleteOrder, readImageAsBase64 } from "./orders-api.js";
ensurePinOrRedirect();

function safeText(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function togglePreTax(hasTaxFree) {
  const yesBtn = document.getElementById("taxBtnYes");
  const noBtn = document.getElementById("taxBtnNo");
  const taxRateGroup = document.getElementById("taxRateGroup");
  const taxFreeGroup = document.getElementById("preTaxFreeGroup");
  const isTaxFreeInput = document.getElementById("preIsTaxFree");

  if (hasTaxFree) {
    isTaxFreeInput.value = "true";
    yesBtn.classList.add("active");
    noBtn.classList.remove("active");
    taxRateGroup.style.display = "block";
    taxFreeGroup.style.display = "block";
  } else {
    isTaxFreeInput.value = "false";
    yesBtn.classList.remove("active");
    noBtn.classList.add("active");
    taxRateGroup.style.display = "none";
    taxFreeGroup.style.display = "none";
    document.getElementById("preTaxRate").value = 10;
    document.getElementById("preTaxFreePrice").value = "";
  }
}

function setPreBuyer(name, btnEl) {
  document.getElementById("preBuyer").value = name;

  const group = document.getElementById("preBuyerGroup");
  group.querySelectorAll(".btn-opt").forEach(b => b.classList.remove("active"));
  btnEl.classList.add("active");

  const rayBox = document.getElementById("preRayCardOptions");
  if (name === "Ray") {
    rayBox.style.display = "block";
  } else {
    rayBox.style.display = "none";
    document.getElementById("preRayCard").value = "";
    rayBox.querySelectorAll(".btn-opt").forEach(b => b.classList.remove("active"));
  }
}

function setPreRayCard(cardName, btnEl) {
  document.getElementById("preRayCard").value = cardName;
  const rayBox = document.getElementById("preRayCardOptions");
  rayBox.querySelectorAll(".btn-opt").forEach(b => b.classList.remove("active"));
  btnEl.classList.add("active");
}

async function savePreOrder() {
  try {
    const fileInput = document.getElementById("preImg");
    let imageBase64 = null;
    if (fileInput?.files?.length) {
      imageBase64 = await readImageAsBase64(fileInput.files[0]);
    }

    const name = document.getElementById("preName").value.trim();
    const customer = document.getElementById("preCust").value.trim();
    const buyer = document.getElementById("preBuyer").value;
    const rayCard = document.getElementById("preRayCard").value;
    const loc = document.getElementById("preLoc").value.trim();

    const isTaxFree = document.getElementById("preIsTaxFree").value === "true";
    const taxPrice = Number(document.getElementById("preTaxPrice").value || 0);
    const taxRate = Number(document.getElementById("preTaxRate").value || 0);
    const taxFreePrice = Number(document.getElementById("preTaxFreePrice").value || 0);

    const qty = parseInt(document.getElementById("preQty").value || "1", 10);
    const sellPrice = Number(document.getElementById("preSellPrice").value || 0);

    if (!name) return alert("請輸入商品名稱");
    if (!taxPrice) return alert("請輸入含稅價");
    if (!buyer) return alert("請選擇負責買手");

    await createOrder({
      type: "preorder",
      country: "JP",
      name,
      qty: Number.isFinite(qty) && qty > 0 ? qty : 1,
      buyer,
      customer,
      loc,
      currency: "JPY",
      cost: taxPrice,
      sellPrice: sellPrice || null,
      isBought: false,
      image: imageBase64,
      extra: {
        isBought: false,
        isTaxFree,
        taxRate: isTaxFree ? taxRate : "",
        taxFreePrice: isTaxFree ? taxFreePrice : "",
        rayCard: buyer === "Ray" ? rayCard : ""
      }
    });

    renderJPPreorders();

    document.getElementById("preImg").value = "";
    document.getElementById("preName").value = "";
    document.getElementById("preCust").value = "";
    document.getElementById("preLoc").value = "";
    document.getElementById("preTaxPrice").value = "";
    document.getElementById("preQty").value = "1";
    document.getElementById("preSellPrice").value = "";
    togglePreTax(false);

    document.getElementById("preBuyer").value = "";
    document.querySelectorAll("#preBuyerGroup .btn-opt").forEach(b => b.classList.remove("active"));
    document.getElementById("preRayCardOptions").style.display = "none";
    document.getElementById("preRayCard").value = "";

    alert("已儲存");
  } catch (e) {
    console.error(e);
    alert("儲存失敗：" + (e?.message || e));
  }
}

async function updateTop(id, field, rawValue, valueType = "string") {
  let v = rawValue;
  if (valueType === "number") {
    v = rawValue === "" ? null : Number(rawValue);
    if (Number.isNaN(v)) v = null;
  } else if (valueType === "int") {
    v = rawValue === "" ? null : parseInt(rawValue, 10);
    if (Number.isNaN(v)) v = null;
  } else {
    v = String(rawValue ?? "").trim();
  }
  const patch = {};
  patch[field] = v;
  await updateOrder(id, patch, null);
}

async function updateExtra(id, extraPatch) {
  await updateOrder(id, {}, extraPatch);
}

async function toggleBought(id, checked) {
  await updateExtra(id, { isBought: !!checked });
  renderJPPreorders();
}

async function updateOrderImage(id, fileInputEl) {
  if (!fileInputEl.files || fileInputEl.files.length === 0) return;
  const img = await readImageAsBase64(fileInputEl.files[0]);
  await updateExtra(id, { imageBase64: img });
  renderJPPreorders();
}

function toggleDetail(id) {
  const el = document.getElementById("detail-" + id);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "block" : "none";
}

async function deleteOne(id) {
  const ok = confirm("確定要刪除這筆資料嗎？");
  if (!ok) return;
  await deleteOrder(id);
  renderJPPreorders();
}

async function renderJPPreorders() {
  const container = document.getElementById("preOrderList");
  const emptyState = document.getElementById("jpEmptyState");
  if (!container) return;

  container.innerHTML = "";

  const all = await listOrders();
  const list = all
    .filter(o => o.type === "preorder" && o.country === "JP")
    .sort((a, b) => (a.created_at < b.created_at ? 1 : -1));

  if (list.length === 0) {
    if (emptyState) emptyState.style.display = "block";
    return;
  } else {
    if (emptyState) emptyState.style.display = "none";
  }

  const grouped = {};
  for (const o of list) {
    const key = o.customer ? String(o.customer).trim() : "未填顧客";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(o);
  }

  Object.keys(grouped).forEach(customerName => {
    const groupWrap = document.createElement("div");
    groupWrap.style.border = "1px solid var(--soft-border)";
    groupWrap.style.borderRadius = "18px";
    groupWrap.style.background = "#fff";
    groupWrap.style.boxShadow = "var(--shadow-soft)";
    groupWrap.style.overflow = "hidden";

    const header = document.createElement("div");
    header.style.display = "flex";
    header.style.alignItems = "center";
    header.style.gap = "10px";
    header.style.padding = "14px 16px";
    header.style.borderBottom = "1px solid var(--soft-border)";
    header.innerHTML = `
      <div style="font-size:22px; line-height:1;">👤</div>
      <div style="font-weight:800; font-size:1.05rem;">${safeText(customerName)}</div>
    `;
    groupWrap.appendChild(header);

    grouped[customerName].forEach((order, i) => {
      const isBought = !!(order.extra?.isBought);
      const rayCard = order.extra?.rayCard ? order.extra.rayCard : "";

      const isTaxFree = !!(order.extra && (order.extra.isTaxFree === true || String(order.extra.isTaxFree) === "true"));
      const taxRateVal = order.extra?.taxRate ?? "";
      const taxFreePriceVal = order.extra?.taxFreePrice ?? "";

      const row = document.createElement("div");
      row.style.padding = "14px 16px";
      row.style.borderBottom = i === grouped[customerName].length - 1 ? "none" : "1px solid var(--soft-border)";
      row.style.background = isBought ? "#ecfdf3" : "#ffffff";

      row.innerHTML = `
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
          <div style="display:flex; gap:12px; align-items:center; min-width:0;">
            ${order.image ? `<img src="${order.image}" alt="img" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex:0 0 auto;">` : ""}
            <div style="min-width:0;">
              <div style="font-size:1.25rem; font-weight:800; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                ${safeText(order.name)}
              </div>
              <div style="margin-top:4px; color:var(--text-sub); font-size:0.9rem;">
                成本 ${safeText(order.cost ?? 0)} ¥ ｜ 售價 ${safeText(order.sellPrice ?? 0)} NT$
              </div>
            </div>
          </div>

          <div style="display:flex; align-items:center; gap:10px; flex:0 0 auto;">
            <label style="display:flex; align-items:center; gap:6px; font-size:0.95rem; color:${isBought ? "#16a34a" : "var(--text-sub)"};">
              <input type="checkbox" ${isBought ? "checked" : ""} onchange="toggleBought('${order.id}', this.checked)">
              ${isBought ? "已買" : "未買"}
            </label>

            <button type="button" onclick="toggleDetail('${order.id}')"
              style="border:1px solid var(--soft-border); background:#fff; border-radius:8px; padding:6px 8px; cursor:pointer;">✏</button>

            <button type="button" onclick="deleteOne('${order.id}')"
              style="border:1px solid var(--soft-border); background:#fff; border-radius:8px; padding:6px 8px; cursor:pointer; color:#ef4444;">🗑</button>
          </div>
        </div>

        <div id="detail-${order.id}" style="display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--soft-border);">
          <div style="display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px;">
            <div style="grid-column:1 / -1;">
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">商品照片</div>
              <div style="display:flex; align-items:center; gap:10px;">
                ${order.image ? `<img src="${order.image}" alt="img" style="width:56px;height:56px;border-radius:12px;object-fit:cover;border:1px solid var(--soft-border);">` : ""}
                <input type="file" accept="image/*" onchange="updateOrderImage('${order.id}', this)">
              </div>
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">商品名</div>
              <input class="field-input" type="text" value="${safeText(order.name)}"
                oninput="updateTop('${order.id}','name',this.value,'string')">
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">顧客</div>
              <input class="field-input" type="text" value="${safeText(order.customer || '')}"
                oninput="updateTop('${order.id}','customer',this.value,'string')">
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">買手</div>
              <select class="field-select"
                onchange="updateTop('${order.id}','buyer',this.value,'string').then(()=>renderJPPreorders());">
                <option value="">未指定</option>
                <option value="Ray"   ${order.buyer === "Ray" ? "selected" : ""}>Ray</option>
                <option value="Nana"  ${order.buyer === "Nana" ? "selected" : ""}>Nana</option>
                <option value="Cupid" ${order.buyer === "Cupid" ? "selected" : ""}>Cupid</option>
              </select>
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">數量</div>
              <select class="field-select" onchange="updateTop('${order.id}','qty',this.value,'int')">
                ${Array.from({length:10}, (_,k)=>k+1).map(n=>`
                  <option value="${n}" ${Number(order.qty||1)===n ? "selected":""}>${n}</option>
                `).join("")}
              </select>
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">成本 (¥)</div>
              <input class="field-input" type="number" value="${safeText(order.cost ?? '')}"
                oninput="updateTop('${order.id}','cost',this.value,'number')">
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">售價 (NT$)</div>
              <input class="field-input" type="number" value="${safeText(order.sellPrice ?? '')}"
                oninput="updateTop('${order.id}','sellPrice',this.value,'number')">
            </div>

            <div style="${order.buyer === "Ray" ? "" : "display:none;"}">
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">Ray 信用卡</div>
              <select class="field-select" onchange="updateExtra('${order.id}',{rayCard:this.value})">
                <option value="">未指定</option>
                <option value="na爸卡" ${rayCard === "na爸卡" ? "selected" : ""}>na爸卡</option>
                <option value="ray卡"  ${rayCard === "ray卡"  ? "selected" : ""}>ray卡</option>
                <option value="qp卡"   ${rayCard === "qp卡"   ? "selected" : ""}>qp卡</option>
              </select>
            </div>

            <div>
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">地點</div>
              <input class="field-input" type="text" value="${safeText(order.loc || '')}"
                oninput="updateExtra('${order.id}',{loc:this.value})">
            </div>

            <div style="grid-column:1 / -1;">
              <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px;">退稅資訊（可選）</div>

              <div style="display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px;">
                <div>
                  <div style="font-size:0.72rem; color:var(--text-sub); margin-bottom:6px;">是否退稅</div>
                  <select class="field-select"
                    onchange="updateExtra('${order.id}',{isTaxFree:this.value==='true', taxRate:(this.value==='true')? '${taxRateVal}':'', taxFreePrice:(this.value==='true')? '${taxFreePriceVal}':'' }).then(()=>renderJPPreorders());">
                    <option value="false" ${!isTaxFree ? "selected":""}>無</option>
                    <option value="true"  ${isTaxFree ? "selected":""}>有</option>
                  </select>
                </div>

                <div style="grid-column:2 / 4; display:${isTaxFree ? "grid" : "none"}; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px;">
                  <div>
                    <div style="font-size:0.72rem; color:var(--text-sub); margin-bottom:6px;">稅率</div>
                    <input class="field-input" type="number" value="${safeText(taxRateVal)}"
                      oninput="updateExtra('${order.id}',{taxRate:this.value})">
                  </div>
                  <div>
                    <div style="font-size:0.72rem; color:var(--text-sub); margin-bottom:6px;">退稅價</div>
                    <input class="field-input" type="number" value="${safeText(taxFreePriceVal)}"
                      oninput="updateExtra('${order.id}',{taxFreePrice:this.value})">
                  </div>
                </div>
              </div>
            </div>

          </div>

          <div style="margin-top:10px; font-size:0.78rem; color:var(--text-sub);">
            ※ 修改會即時儲存（不用另外按儲存）
          </div>
        </div>
      `;

      groupWrap.appendChild(row);
    });

    container.appendChild(groupWrap);
  });
}

window.togglePreTax = togglePreTax;
window.setPreBuyer = setPreBuyer;
window.setPreRayCard = setPreRayCard;
window.savePreOrder = savePreOrder;
window.renderJPPreorders = renderJPPreorders;
window.updateTop = updateTop;
window.updateExtra = updateExtra;
window.toggleBought = toggleBought;
window.updateOrderImage = updateOrderImage;
window.toggleDetail = toggleDetail;
window.deleteOne = deleteOne;

renderJPPreorders();
</script>
</body>
</html>
