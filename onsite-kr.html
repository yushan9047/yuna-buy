<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新增現場採購（韓國）</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header-bar">
    <button class="back-btn" type="button" onclick="window.history.back()">← 返回</button>
    <h2>🇰🇷 新增現場採購（韓國）</h2>
  </div>

  <main class="page-body">
    <div class="card">

      <!-- 商品照片 -->
      <div class="form-group">
        <label for="pImg">📷 商品照片</label>
        <input type="file" id="pImg" accept="image/*">
      </div>

      <!-- 商品品名 -->
      <div class="form-group">
        <label for="pName">📦 品名</label>
        <input type="text" id="pName" placeholder="請輸入品名">
      </div>

      <!-- 購入價格：韓幣 & 美金 -->
      <div class="row-two">
        <div class="form-group" style="flex:1;">
          <label for="pPriceKRW">💰 韓幣購入價格 (₩)</label>
          <input type="number" id="pPriceKRW" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group" style="flex:1;">
          <label for="pPriceUSD">💵 美金購入價格 (US$)</label>
          <input type="number" id="pPriceUSD" placeholder="0" min="0" step="0.01">
        </div>
      </div>

      <!-- 販售價格（台幣） -->
      <div class="form-group">
        <label for="pPriceSell">💎 販售價格 (NT$)</label>
        <input type="number" id="pPriceSell" placeholder="0" min="0" step="1">
      </div>

      <!-- 數量 + 地點 -->
      <div class="row-two">
        <div class="form-group" style="flex:1;">
          <label for="pQty">🔢 數量</label>
          <input type="number" id="pQty" value="1" min="1" step="1">
        </div>
        <div class="form-group" style="flex:1;">
          <label for="pLoc">📍 地點</label>
          <input type="text" id="pLoc" placeholder="例如：明洞 / 弘大">
        </div>
      </div>

      <!-- 顧客 -->
      <div class="form-group">
        <label for="pCustomer">👤 顧客名</label>
        <input type="text" id="pCustomer" placeholder="客名">
      </div>

      <!-- 買手（只有 Nana / Cupid） -->
      <div class="form-group">
        <label>🧤 負責買手</label>
        <div class="btn-group" id="buyBuyerGroup">
          <button class="btn-opt" type="button"
                  onclick="setBuyer('Nana', this)">Nana</button>
          <button class="btn-opt" type="button"
                  onclick="setBuyer('Cupid', this)">Cupid</button>
        </div>
        <input type="hidden" id="pBuyer">
      </div>

      <!-- 儲存 -->
      <button class="submit-btn" type="button" onclick="saveData()">
        🚀 確認儲存
      </button>

    </div>
  </main>

  <script>
    // 設定買手（Nana / Cupid）
    function setBuyer(name, btnEl) {
      const buyerInput = document.getElementById('pBuyer');
      buyerInput.value = name;

      const group = document.getElementById('buyBuyerGroup');
      const buttons = group.querySelectorAll('.btn-opt');
      buttons.forEach(btn => btn.classList.remove('active'));

      btnEl.classList.add('active');
    }

    // 儲存資料（目前先 console.log）
    function saveData() {
      const data = {
        country: "KR",
        name: document.getElementById('pName').value.trim(),
        priceKRW: Number(document.getElementById('pPriceKRW').value || 0),
        priceUSD: Number(document.getElementById('pPriceUSD').value || 0),
        sellPrice: Number(document.getElementById('pPriceSell').value || 0),
        qty: Number(document.getElementById('pQty').value || 1),
        loc: document.getElementById('pLoc').value.trim(),
        customer: document.getElementById('pCustomer').value.trim(),
        buyer: document.getElementById('pBuyer').value
      };

      // 基本檢查
      if (!data.name) {
        alert("請輸入品名");
        return;
      }

      if (!data.priceKRW && !data.priceUSD) {
        alert("請至少輸入一個購入價格（韓幣或美金）");
        return;
      }

      if (!data.buyer) {
        alert("請選擇負責買手");
        return;
      }

      console.log("韓國現場採購資料：", data);
      alert("已暫存（目前為 console.log，可之後接後端或 localStorage）");
    }
  </script>

</body>
</html>
