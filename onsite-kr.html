<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新增現場採購（韓國）</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header-bar">
    <button class="back-btn" type="button" onclick="window.history.back()">← 返回</button>
    <h2>🇰🇷 新增現場採購（韓國）</h2>
  </div>

  <main class="page-body">
    <div class="card">
      <div class="form-group">
        <label for="pImg">📷 商品照片</label>
        <input type="file" id="pImg" accept="image/*">
      </div>

      <div class="form-group">
        <label for="pName">📦 品名</label>
        <input type="text" id="pName" placeholder="請輸入品名">
      </div>

      <div class="row-two">
        <div class="form-group" style="flex:1;">
          <label for="pPriceKRW">💰 韓幣購入價格 (₩)</label>
          <input type="number" id="pPriceKRW" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group" style="flex:1;">
          <label for="pPriceUSD">💵 美金購入價格 (US$)</label>
          <input type="number" id="pPriceUSD" placeholder="0" min="0" step="0.01">
        </div>
      </div>

      <div class="form-group">
        <label for="pPriceSell">💎 販售價格 (NT$)</label>
        <input type="number" id="pPriceSell" placeholder="0" min="0" step="1">
      </div>

      <div class="row-two">
        <div class="form-group" style="flex:1;">
          <label for="pQty">🔢 數量</label>
          <input type="number" id="pQty" value="1" min="1" step="1">
        </div>
        <div class="form-group" style="flex:1;">
          <label for="pLoc">📍 地點</label>
          <input type="text" id="pLoc" placeholder="例如：明洞 / 弘大">
        </div>
      </div>

      <div class="form-group">
        <label for="pCustomer">👤 顧客名</label>
        <input type="text" id="pCustomer" placeholder="客名">
      </div>

      <div class="form-group">
        <label>🧤 負責買手</label>
        <div class="btn-group" id="buyBuyerGroup">
          <button class="btn-opt" type="button" onclick="setBuyer('Nana', this)">Nana</button>
          <button class="btn-opt" type="button" onclick="setBuyer('Cupid', this)">Cupid</button>
        </div>
        <input type="hidden" id="pBuyer">
      </div>

      <button class="submit-btn" type="button" onclick="saveData()">🚀 確認儲存</button>
    </div>
  </main>

<script type="module">
import { ensurePinOrRedirect } from "./pin.js";
import { createOrder, readImageAsBase64 } from "./orders-api.js";
ensurePinOrRedirect();

function setBuyer(name, btnEl) {
  document.getElementById('pBuyer').value = name;
  const group = document.getElementById('buyBuyerGroup');
  group.querySelectorAll('.btn-opt').forEach(btn => btn.classList.remove('active'));
  btnEl.classList.add('active');
}

async function saveData() {
  try {
    const fileInput = document.getElementById("pImg");
    let imageBase64 = null;
    if (fileInput?.files?.length) {
      imageBase64 = await readImageAsBase64(fileInput.files[0]);
    }

    const name = document.getElementById('pName').value.trim();
    const priceKRW = Number(document.getElementById('pPriceKRW').value || 0);
    const priceUSD = Number(document.getElementById('pPriceUSD').value || 0);
    const sellPrice = Number(document.getElementById('pPriceSell').value || 0);
    const qty = Number(document.getElementById('pQty').value || 1);
    const loc = document.getElementById('pLoc').value.trim();
    const customer = document.getElementById('pCustomer').value.trim();
    const buyer = document.getElementById('pBuyer').value;

    if (!name) return alert("請輸入品名");
    if (!priceKRW && !priceUSD) return alert("請至少輸入一個購入價格（韓幣或美金）");
    if (!buyer) return alert("請選擇負責買手");

    // 主幣別與第二成本：只用你 DB 一定有的 currency/cost，其它塞 extra
    let currency = null, cost = null;
    let currency2 = null, cost2 = null;

    if (priceKRW) { currency = "KRW"; cost = priceKRW; }
    if (priceUSD) {
      if (!currency) { currency = "USD"; cost = priceUSD; }
      else { currency2 = "USD"; cost2 = priceUSD; }
    }

    await createOrder({
      type: "onsite",
      country: "KR",
      name,
      qty,
      buyer,
      customer,
      currency,
      cost,
      sellPrice: sellPrice || null,
      loc,
      image: imageBase64,
      currency2,
      cost2,
      extra: { currency2, cost2 }
    });

    alert("已儲存到 Supabase（韓國現場採購）");
    location.reload();
  } catch (e) {
    console.error(e);
    alert("儲存失敗：" + (e?.message || e));
  }
}

window.setBuyer = setBuyer;
window.saveData = saveData;
</script>
</body>
</html>
