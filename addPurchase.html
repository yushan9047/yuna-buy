<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新增現場採購</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header-bar">
    <button class="back-btn" onclick="window.history.back()">← 返回</button>
    <h2>新增現場採購</h2>
  </div>

  <div class="card">
    <!-- 商品照片 -->
    <div class="form-group">
      <label>📷 商品照片</label>
      <input type="file" id="pImg" accept="image/*">
    </div>

    <!-- 商品品名 -->
    <div class="form-group">
      <label>📦 品名</label>
      <input type="text" id="pName" placeholder="請輸入品名">
    </div>

    <!-- 含稅成本 -->
    <div class="form-group">
      <label>💰 含稅成本 (¥)</label>
      <input type="number" id="pPriceTax" placeholder="0">
    </div>

    <!-- 退稅設定 -->
    <div class="form-group">
      <label>🏷️ 退稅設定</label>
      <div class="btn-group">
        <button id="buyTaxBtnYes" class="btn-opt" onclick="toggleBuyTax(true)">有退稅</button>
        <button id="buyTaxBtnNo" class="btn-opt active" onclick="toggleBuyTax(false)">無退稅</button>
      </div>
      <input type="hidden" id="buyIsTaxFree" value="false">
    </div>

    <div style="display:flex; gap:12px;">
      <div class="form-group" id="buyTaxRateGroup" style="flex:1; display:none;">
        <label>％ 稅率</label>
        <input type="number" id="buyTaxRate" value="10">
      </div>
      <div class="form-group" id="buyTaxFreeGroup" style="flex:1; display:none;">
        <label>💸 退稅價 (¥)</label>
        <input type="number" id="buyTaxFreePrice" placeholder="0">
      </div>
    </div>

    <!-- 販售價格 -->
    <div class="form-group">
      <label>💎 販售價格 (NT$)</label>
      <input type="number" id="pPriceSell" placeholder="0">
    </div>

    <!-- 數量與地點 -->
    <div style="display:flex; gap:12px;">
      <div class="form-group" style="flex:1"><label>🔢 數量</label><input type="number" id="pQty" value="1"></div>
      <div class="form-group" style="flex:1"><label>📍 地點</label><input type="text" id="pLoc" placeholder="地點"></div>
    </div>

    <!-- 顧客名稱 -->
    <div class="form-group">
      <label>👤 顧客名</label>
      <input type="text" id="pCustomer" placeholder="客名">
    </div>

    <!-- 負責買手 -->
    <div class="form-group">
      <label>🧤 負責買手</label>
      <div class="btn-group" id="buyBuyerGroup">
        <button class="btn-opt" onclick="setBuyer('Ray', this)">Ray</button>
        <button class="btn-opt" onclick="setBuyer('Nana', this)">Nana</button>
        <button class="btn-opt" onclick="setBuyer('Cupid', this)">Cupid</button>
      </div>
      <input type="hidden" id="pBuyer">

      <!-- Ray 買手顯示卡片選擇 -->
      <div id="rayCardOptions" style="display:none; background:var(--soft); padding:15px; border-radius:25px; margin-top:15px; border:1px solid var(--soft-border);">
        <label style="color:var(--primary);">💳 選擇卡片</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn-opt" onclick="setRayCard('na爸卡', this)" style="padding:10px">na爸卡</button>
          <button class="btn-opt" onclick="setRayCard('ray卡', this)" style="padding:10px">ray卡</button>
          <button class="btn-opt" onclick="setRayCard('qp卡', this)" style="padding:10px">qp卡</button>
        </div>
        <input type="hidden" id="pRayCard">
      </div>
    </div>

    <!-- 儲存按鈕 -->
    <button class="submit-btn" onclick="saveData()">🚀 確認儲存</button>
  </div>
</body>
</html>
